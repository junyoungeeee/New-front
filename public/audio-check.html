<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>소리 진단</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font: 15px/1.6 -apple-system, system-ui, sans-serif;
        background: #e4ded6;
        color: #191817;
      }
      h1 { font-size: 19px; margin: 0 0 4px; }
      p.hint { margin: 0 0 18px; font-size: 13px; color: #55504b; }
      button {
        display: block;
        width: 100%;
        margin: 0 0 10px;
        padding: 16px;
        font: 600 16px -apple-system, system-ui, sans-serif;
        color: #e8427e;
        background: rgba(232, 66, 126, 0.19);
        border: 1px solid rgba(232, 66, 126, 0.48);
        border-radius: 999px;
      }
      #log {
        margin-top: 18px;
        padding: 14px;
        background: #fffdfb;
        border: 1px solid #ded7d0;
        border-radius: 8px;
        font: 12px/1.7 ui-monospace, monospace;
        white-space: pre-wrap;
        word-break: break-all;
        min-height: 160px;
      }
      .ok { color: #1f7a3d; }
      .bad { color: #c72e64; }
    </style>
  </head>
  <body>
    <h1>소리 진단</h1>
    <p class="hint">위에서부터 차례로 눌러주세요. 각 단계에서 소리가 들렸는지 기억해두세요.</p>

    <button id="b1">① 오디오 깨우기</button>
    <button id="b2">② 삐 소리 (합성 · 파일 없음)</button>
    <button id="b3">③ 급지음 파일 받아서 해독</button>
    <button id="b4">④ 급지음 재생 — Web Audio</button>
    <button id="b5">⑤ 급지음 재생 — audio 태그</button>
    <button id="b6">⑥ 급지음 합성 (래칫)</button>

    <div id="log">준비됨.</div>

    <script>
      const logEl = document.getElementById('log');
      let lines = [];
      const log = (msg, cls) => {
        lines.push(cls ? `<span class="${cls}">${msg}</span>` : msg);
        logEl.innerHTML = lines.join('\n');
      };

      let ctx = null;
      let clip = null;

      document.getElementById('b1').onclick = async () => {
        try {
          ctx = ctx || new (window.AudioContext || window.webkitAudioContext)();
          log(`생성 직후 상태: ${ctx.state}`);
          await ctx.resume();
          log(`resume 후 상태: ${ctx.state}`, ctx.state === 'running' ? 'ok' : 'bad');
          log(`샘플레이트: ${ctx.sampleRate}Hz / 출력 채널: ${ctx.destination.channelCount}`);
        } catch (e) {
          log('깨우기 실패: ' + e, 'bad');
        }
      };

      document.getElementById('b2').onclick = () => {
        if (!ctx) return log('①을 먼저 눌러주세요', 'bad');
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 440;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
        gain.gain.linearRampToValueAtTime(0, now + 0.8);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.8);
        log(`② 삐 소리 예약함 (상태 ${ctx.state}) — 들렸나요?`);
      };

      document.getElementById('b3').onclick = async () => {
        if (!ctx) return log('①을 먼저 눌러주세요', 'bad');
        try {
          const res = await fetch('/feed.m4a');
          log(`받기: HTTP ${res.status} ${res.headers.get('content-type')}`);
          const raw = await res.arrayBuffer();
          log(`크기: ${raw.byteLength} bytes`);
          clip = await new Promise((ok, no) => ctx.decodeAudioData(raw, ok, no));
          log(`해독 성공: ${clip.duration.toFixed(2)}초 / ${clip.numberOfChannels}채널`, 'ok');
        } catch (e) {
          clip = null;
          log('해독 실패: ' + (e && e.message ? e.message : e), 'bad');
        }
      };

      document.getElementById('b4').onclick = () => {
        if (!ctx) return log('①을 먼저 눌러주세요', 'bad');
        if (!clip) return log('③을 먼저 성공시켜 주세요', 'bad');
        const now = ctx.currentTime;
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        src.buffer = clip;
        gain.gain.value = 0.5;
        src.connect(gain).connect(ctx.destination);
        src.start(now);
        src.stop(now + 2);
        log(`④ 클립 재생 예약함 (상태 ${ctx.state}) — 들렸나요?`);
      };

      document.getElementById('b5').onclick = async () => {
        try {
          const el = new Audio('/feed.m4a');
          el.volume = 1;
          await el.play();
          log('⑤ audio 태그 재생 시작 — 들렸나요?', 'ok');
        } catch (e) {
          log('⑤ audio 태그 실패: ' + (e && e.message ? e.message : e), 'bad');
        }
      };

      document.getElementById('b6').onclick = () => {
        if (!ctx) return log('①을 먼저 눌러주세요', 'bad');
        const now = ctx.currentTime;
        const out = ctx.createGain();
        out.gain.value = 0.5;
        out.connect(ctx.destination);

        const len = Math.floor(ctx.sampleRate * 0.5);
        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;

        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.loop = true;
        const band = ctx.createBiquadFilter();
        band.type = 'bandpass';
        band.frequency.value = 2600;
        const chop = ctx.createGain();
        chop.gain.setValueAtTime(0.0001, now);
        for (let i = 0; i < 100; i++) {
          const t = now + i / 52;
          chop.gain.setValueAtTime(0.0001, t);
          chop.gain.linearRampToValueAtTime(0.8, t + 0.0012);
          chop.gain.exponentialRampToValueAtTime(0.0001, t + 0.013);
        }
        src.connect(band).connect(chop).connect(out);
        src.start(now);
        src.stop(now + 2);
        log(`⑥ 합성 래칫 예약함 (상태 ${ctx.state}) — 들렸나요?`);
      };
    </script>
  </body>
</html>
