name: NewApp
options:
  bundleIdPrefix: com.junyounge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  NewApp:
    type: application
    platform: iOS
    # 리소스는 경로를 하나씩 적는다. Resources 를 통째로 넣으면 도구가 흘린
    # 임시 파일까지 번들에 딸려 들어간다.
    sources:
      - path: Sources
        excludes: ["**/.omc/**", "**/.omc"]
      - path: Resources/Assets.xcassets
        buildPhase: resources
        excludes: ["**/.omc/**", "**/.omc"]
      - path: Resources/Fonts
        buildPhase: resources
        excludes: ["**/.omc/**", "**/.omc"]
      - path: Resources/Seed
        buildPhase: resources
        excludes: ["**/.omc/**", "**/.omc"]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junyounge.newapp
        PRODUCT_NAME: NewApp
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: ""
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: "New."
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: true
        NSCameraUsageDescription: "바코드를 읽고 제품 사진을 찍는 데 카메라를 사용합니다."
        NSPhotoLibraryAddUsageDescription: "등록한 제품 사진을 저장할 때 사용합니다."
        # 리소스는 번들 최상위로 평탄화되므로 파일명만 적는다.
        UIAppFonts:
          - Archivo-Regular.ttf
          - Archivo-Bold.ttf
          - SpaceMono-Regular.ttf
          - SpaceMono-Bold.ttf

  NewAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: NewApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junyounge.newapp.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NewApp:
    build:
      targets:
        NewApp: all
        NewAppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NewAppUITests
